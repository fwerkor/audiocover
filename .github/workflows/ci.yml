name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install FFmpeg on Ubuntu
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ffmpeg libsndfile1
      - name: Install FFmpeg on Windows
        if: runner.os == 'Windows'
        run: choco install ffmpeg -y
      - name: Install FFmpeg on macOS
        if: runner.os == 'macOS'
        run: brew install ffmpeg
      - name: Install package
        run: python -m pip install -U pip && python -m pip install -e ".[dev]"
      - name: Lint
        run: ruff check src tests
      - name: Compile
        run: python -m compileall src tests
      - name: Tests
        run: pytest

  backend-runtimes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install platform packages
        run: sudo apt-get update && sudo apt-get install -y ffmpeg libsndfile1 python3-tk
      - name: Install build dependencies
        run: python -m pip install -U pip && python -m pip install -e ".[build]"
      - name: Build worker runtimes
        run: python scripts/build_desktop.py --workers-only
