name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag to create, for example v0.5.0'
        required: true
        type: string
      prerelease:
        description: 'Mark this release as a prerelease'
        required: true
        default: false
        type: boolean

permissions:
  contents: write

run-name: release ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}

jobs:
  build-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install -U pip build
      - run: python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/*

  build-desktop:
    name: desktop ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x64
            os: windows-latest
          - name: linux-x64
            os: ubuntu-latest
          - name: linux-arm64
            os: ubuntu-24.04-arm
          - name: macos-arm64
            os: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install platform packages on Ubuntu
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ffmpeg libsndfile1 python3-tk
      - name: Install FFmpeg on Windows
        if: runner.os == 'Windows'
        run: choco install ffmpeg -y
      - name: Install FFmpeg on macOS
        if: runner.os == 'macOS'
        run: brew install ffmpeg
      - name: Install desktop build dependencies
        run: python -m pip install -U pip && python -m pip install -e ".[build]"
      - name: Build desktop bundle
        run: python scripts/build_desktop.py --worker-set desktop
      - name: Smoke test desktop bundle
        run: python scripts/build_desktop.py --smoke-test-only
      - uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.name }}
          path: dist/audiocover-*
          if-no-files-found: error

  build-runtime-pack:
    name: runtime ${{ matrix.backend }} ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - backend: demucs
            packages: '"torch>=2.2.0" "torchaudio>=2.2.0" "demucs>=4.0.1"'
            pip: pip
            python: '3.12'
            name: windows-x64
            os: windows-latest
          - backend: demucs
            packages: '"torch>=2.2.0" "torchaudio>=2.2.0" "demucs>=4.0.1"'
            pip: pip
            python: '3.12'
            name: linux-x64
            os: ubuntu-latest
          - backend: demucs
            packages: '"torch>=2.2.0" "torchaudio>=2.2.0" "demucs>=4.0.1"'
            pip: pip
            python: '3.12'
            name: linux-arm64
            os: ubuntu-24.04-arm
          - backend: demucs
            packages: '"torch>=2.2.0" "torchaudio>=2.2.0" "demucs>=4.0.1"'
            pip: pip
            python: '3.12'
            name: macos-arm64
            os: macos-latest
          - backend: so-vits-svc
            packages: '"so-vits-svc-fork==4.2.30" "scikit-learn>=1.4.0"'
            pip: pip
            python: '3.12'
            name: windows-x64
            os: windows-latest
          - backend: so-vits-svc
            packages: '"so-vits-svc-fork==4.2.30" "scikit-learn>=1.4.0"'
            pip: pip
            python: '3.12'
            name: linux-x64
            os: ubuntu-latest
          - backend: so-vits-svc
            packages: '"so-vits-svc-fork==4.2.30" "scikit-learn>=1.4.0"'
            pip: pip
            python: '3.12'
            name: linux-arm64
            os: ubuntu-24.04-arm
          - backend: so-vits-svc
            packages: '"so-vits-svc-fork==4.2.30" "scikit-learn>=1.4.0"'
            pip: pip
            python: '3.12'
            name: macos-arm64
            os: macos-latest
          - backend: rvc
            packages: '"rvc-python==0.1.5"'
            pip: '"pip<24.1"'
            python: '3.10'
            name: linux-x64
            os: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install platform packages on Ubuntu
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ffmpeg libsndfile1 python3-tk
      - name: Install FFmpeg on Windows
        if: runner.os == 'Windows'
        run: choco install ffmpeg -y
      - name: Install FFmpeg on macOS
        if: runner.os == 'macOS'
        run: brew install ffmpeg
      - name: Install runtime build dependencies
        run: python -m pip install -U ${{ matrix.pip }} pyinstaller build && python -m pip install ${{ matrix.packages }}
      - name: Build runtime pack
        run: python scripts/build_desktop.py --runtime-pack ${{ matrix.backend }}
      - uses: actions/upload-artifact@v4
        with:
          name: runtime-${{ matrix.backend }}-${{ matrix.name }}
          path: dist/audiocover-backend-runtimes-*
          if-no-files-found: error

  publish:
    needs: [build-python, build-desktop, build-runtime-pack]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
          target_commitish: ${{ github.event_name == 'workflow_dispatch' && github.sha || '' }}
          prerelease: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || false }}
          generate_release_notes: true
          files: |
            artifacts/python-dist/*
            artifacts/desktop-*/*
            artifacts/runtime-*/*
