name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install -U pip build
      - run: python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/*

  build-windows-gui:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: choco install ffmpeg -y
      - shell: pwsh
        run: ./scripts/build_windows.ps1
      - uses: actions/upload-artifact@v4
        with:
          name: AudioCoverLab-windows
          path: dist/AudioCoverLab-windows.zip

  publish:
    needs: [build-python, build-windows-gui]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/python-dist/*
            artifacts/AudioCoverLab-windows/AudioCoverLab-windows.zip
