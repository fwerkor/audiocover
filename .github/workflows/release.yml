name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag to create, for example v0.9.0'
        required: true
        type: string
      prerelease:
        description: 'Mark this release as a prerelease'
        required: true
        default: false
        type: boolean

permissions:
  contents: write

run-name: release ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}

jobs:
  build-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: python -m pip install -U pip build
      - run: python -m build
      - uses: actions/upload-artifact@v7
        with:
          name: python-dist
          path: dist/*

  build-desktop:
    name: desktop ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x64
            os: windows-latest
            python: '3.12'
            pytorch: cpu-index
          - name: linux-x64
            os: ubuntu-latest
            python: '3.12'
            pytorch: cpu-index
          - name: linux-arm64
            os: ubuntu-24.04-arm
            python: '3.12'
            pytorch: pypi
          - name: macos-arm64
            os: macos-latest
            python: '3.12'
            pytorch: pypi
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
      - name: Install platform packages on Ubuntu
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ffmpeg libsndfile1 python3-tk
      - name: Install FFmpeg on Windows
        if: runner.os == 'Windows'
        run: choco install ffmpeg -y
      - name: Install FFmpeg on macOS
        if: runner.os == 'macOS'
        run: |
          brew untap aws/tap || true
          brew install ffmpeg
      - name: Install CPU PyTorch wheels
        if: matrix.pytorch == 'cpu-index'
        run: python -m pip install --index-url https://download.pytorch.org/whl/cpu --extra-index-url https://pypi.org/simple "torch==2.8.0+cpu" "torchaudio==2.8.0+cpu"
      - name: Install macOS PyTorch wheels
        if: matrix.pytorch == 'pypi'
        run: python -m pip install "torch==2.8.0" "torchaudio==2.8.0"
      - name: Install desktop build dependencies
        run: python -m pip install -U pip && python -m pip install -e ".[build,demucs-backend,so-vits-svc-backend]"
      - name: Build CPU-only fast desktop bundle
        run: python scripts/build_desktop.py
      - name: Smoke test desktop binary
        run: python scripts/build_desktop.py --smoke-test-only
      - uses: actions/upload-artifact@v7
        with:
          name: desktop-${{ matrix.name }}
          path: dist/audiocover-*
          if-no-files-found: error

  publish:
    needs: [build-python, build-desktop]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
          target_commitish: ${{ github.event_name == 'workflow_dispatch' && github.sha || '' }}
          prerelease: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || startsWith(github.ref_name, 'v0.') }}
          generate_release_notes: true
          files: |
            artifacts/python-dist/*
            artifacts/desktop-*/*
